
name: ci_workflows

on: push

jobs:
  run_dvc_pipeline:
    runs-on: ubuntu-latest
    steps: 
      - name: code checkout
        uses: actions/checkout@v3
      
      - name: python setup
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run_pipeline 
        env:
          PULSECORE_PAT: ${{secrets.PULSECORE_PAT}}
          PULSECORE_USERNAME: ${{secrets.PULSECORE_USERNAME}}
        run: |
          dvc repro


      - name: Push DVC-tracked data to remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_PC }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PC }}
          AWS_DEFAULT_REGION: eu-north-1  # Replace with your AWS region
        run: |
          dvc push

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add changes to Git
        run: |
          git add .

      - name: Commit changes
        if: ${{ github.actor != 'github-actions[bot]' }}
        run: |
          git commit -m "Automated commit of DVC outputs and updated code" || echo "No changes to commit"

      - name: Push changes
        if: ${{ github.actor != 'github-actions[bot]' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin ${{ github.ref_name }}

  
      - name: Model testing
        env:
          PULSECORE_PAT: ${{secrets.PULSECORE_PAT}}
          PULSECORE_USERNAME: ${{secrets.PULSECORE_USERNAME}}
        
        run: |
          python tests/model_testing.py

      - name: Model Promotion to Production
        if: success()
        env:
          PULSECORE_PAT: ${{secrets.PULSECORE_PAT}}
          PULSECORE_USERNAME: ${{secrets.PULSECORE_USERNAME}}
        run: |
          python scripts/model_promotion.py     
        
        




