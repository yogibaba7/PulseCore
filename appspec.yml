version: 0.0
os: linux

files:
  - source: .env
    destination: /home/ubuntu/app

  - source: deploy/scripts
    destination: /home/ubuntu/app/deploy/scripts

hooks:
  AfterInstall:
    - location: deploy/scripts/install_dependencies.sh
      timeout: 300
      runas: ubuntu

  ApplicationStart:
    - location: deploy/scripts/start_docker.sh
      timeout: 300
      runas: ubuntu